# Keep Render free-tier API awake by pinging the healthcheck every ~12 minutes.
# Free Render services sleep after ~15 minutes of inactivity.

name: Keep-alive

on:
  schedule:
    # Every 12 minutes (GitHub may delay scheduled runs slightly under load)
    - cron: "*/12 * * * *"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  ping:
    name: Ping Render healthchecks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API healthcheck
        run: |
          set -euo pipefail
          URL="https://sportsanalyzer-api.onrender.com/api/healthcheck"
          UA="Mozilla/5.0 (compatible; SportsAnalyzer-KeepAlive/1.0; +https://github.com)"
          echo "GET $URL"
          curl -fsS --retry 3 --retry-delay 5 --max-time 60 -A "$UA" "$URL"
          echo ""
          echo "API healthcheck OK"

      - name: Ping dashboard (optional)
        continue-on-error: true
        run: |
          set -euo pipefail
          URL="https://sportsanalyzer-dashboard.onrender.com/"
          UA="Mozilla/5.0 (compatible; SportsAnalyzer-KeepAlive/1.0; +https://github.com)"
          echo "GET $URL"
          # Dashboard may return HTML; accept any 2xx/3xx
          curl -fsS --retry 2 --retry-delay 5 --max-time 90 -A "$UA" -o /dev/null -w "HTTP %{http_code}\n" "$URL"
          echo "Dashboard ping OK"
