# render.yaml — Render Blueprint for the Sports Analyzer platform.
# Three long-running Web Services (Fluid/always-on, so connection pools and
# Streamlit's in-memory model cache persist across requests):
#   1. sportsanalyzer-api        FastAPI licensing/Stripe/webhook backend.
#   2. sportsanalyzer-dashboard  The actual product UI (Streamlit) — the
#      six-layer UFC prediction engine, gated by license_gate.py against #1.
#   3. sportsanalyzer-admin      Optional Streamlit admin control tower.
services:
  - type: web
    name: sportsanalyzer-api
    runtime: python
    plan: free
    # Root dir is the repo root so the `backend` package imports cleanly.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    # cron-job.org pings this to keep the free-tier instance awake.
    healthCheckPath: /api/healthcheck
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Secrets — set these in the Render dashboard (sync:false keeps them
      # out of source control). DATABASE_URL must be the Supabase Postgres URL.
      - key: DATABASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_INDIVIDUAL_PRICE_ID
        sync: false
      - key: STRIPE_ENTERPRISE_PRICE_ID
        sync: false
      - key: ADMIN_API_KEY
        sync: false

  - type: web
    name: sportsanalyzer-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # Wires the license gate (license_gate.py) to the FastAPI service above.
      - key: SAAS_API_URL
        value: https://sportsanalyzer-api.onrender.com
      # Used to build Stripe checkout success/cancel redirect URLs back to
      # this dashboard's own public address.
      - key: APP_URL
        value: https://sportsanalyzer-dashboard.onrender.com
      # Optional — enables the "Executive Tactical Breakdown (AI)" section.
      # Leave unset to skip it with no error.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false

  - type: web
    name: sportsanalyzer-admin
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run admin_dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SAAS_API_URL
        value: https://sportsanalyzer-api.onrender.com
      - key: ADMIN_API_KEY
        sync: false
      - key: ADMIN_DASHBOARD_PASSWORD
        sync: false
