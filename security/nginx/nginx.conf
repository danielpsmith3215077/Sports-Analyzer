# Sports Analyzer — nginx reverse proxy + WAF-lite
#
# Self-hosted only. Bind uvicorn/streamlit to 127.0.0.1 and let nginx be the
# sole public entry point.
#
# Threat mitigated: TLS termination, rate limiting, scanner UA blocking,
# request size caps, security headers, upstream isolation.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in error pages / Server header
    server_tokens off;

    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'rt=$request_time u="$upstream_addr"';
    access_log /var/log/nginx/access.log security;

    sendfile        on;
    keepalive_timeout 65;

    # --- Rate limiting zones (mitigate DoS / brute force) ---
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_strict:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # --- Request body size (mitigate large-payload DoS) ---
    client_max_body_size 1m;
    client_body_buffer_size 16k;

    # --- WAF-lite maps (include exploit-pattern blocks) ---
    include /etc/nginx/waf-rules.conf;

    # Upstreams — internal only
    upstream fastapi_backend {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    upstream streamlit_dashboard {
        server 127.0.0.1:8501;
        keepalive 8;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # TLS — replace with your cert paths (Let's Encrypt recommended)
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;

        # --- Security headers ---
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=()" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # Block bad User-Agents (scanners)
        if ($block_bad_ua) {
            return 403;
        }

        # Block suspicious query strings / paths (WAF maps)
        if ($block_sqli) {
            return 400;
        }
        if ($block_traversal) {
            return 400;
        }

        limit_conn conn_per_ip 40;

        # --- FastAPI API ---
        location / {
            limit_req zone=api_general burst=60 nodelay;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Stricter limits on admin / user management
        location ~ ^/(users|admin|enterprise) {
            limit_req zone=api_strict burst=10 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Stripe webhooks — never rate-limit aggressively (Stripe retries)
        location = /webhook/stripe {
            limit_req zone=webhook burst=40 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 256k;
        }

        # Health check — no auth, minimal logging noise
        location = /api/healthcheck {
            access_log off;
            proxy_pass http://fastapi_backend;
        }

        # --- Streamlit dashboard (sub-path or subdomain) ---
        location /dashboard/ {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass http://streamlit_dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
