# nginx WAF-lite rules — map-based blocking (no ModSecurity required)
#
# Include from nginx.conf:  include /etc/nginx/waf-rules.conf;
#
# Threat mitigated: SQLi probes, path traversal, common scanner fingerprints.
# These are defense-in-depth; parameterized queries in backend/db.py are the
# primary SQLi control.

# --- Block known scanner / exploit-tool User-Agents ---
map $http_user_agent $block_bad_ua {
    default                     0;
    ""                          1;   # empty UA
    ~*sqlmap                    1;
    ~*nikto                     1;
    ~*nmap                      1;
    ~*masscan                   1;
    ~*nessus                    1;
    ~*openvas                   1;
    ~*acunetix                  1;
    ~*dirbuster                 1;
    ~*gobuster                  1;
    ~*wfuzz                     1;
    ~*hydra                     1;
    ~*metasploit                1;
    ~*burpsuite                 1;
    ~*w3af                      1;
    ~*arachni                    1;
    ~*skipfish                  1;
    ~*nuclei                    1;
    ~*feroxbuster               1;
    ~*zgrab                     1;
    ~*zmeu                      1;
}

# --- SQL injection patterns in query string ---
map $args $block_sqli {
    default                     0;
    ~*union.*select              1;
    ~*select.*from                1;
    ~*insert.*into                1;
    ~*delete.*from                1;
    ~*drop.*table                 1;
    ~*update.*set                 1;
    ~*or\s+1\s*=\s*1              1;
    ~*'\s*or\s*'                  1;
    ~*--                          1;
    ~*;\s*drop                    1;
    ~*benchmark\s*\(              1;
    ~*sleep\s*\(                  1;
    ~*load_file                   1;
    ~*into\s+outfile              1;
    ~*<script                     1;
    ~*javascript:                 1;
    ~*onerror\s*=                 1;
}

# --- Path traversal patterns ---
map $request_uri $block_traversal {
    default                     0;
    ~*\.\.                        1;
    ~*%2e%2e                      1;
    ~*%252e%252e                  1;
    ~*/etc/passwd                 1;
    ~*/proc/self                  1;
    ~*\.env                       1;
    ~*\.git                       1;
    ~*wp-admin                    1;
    ~*wp-login                    1;
    ~*phpmyadmin                  1;
    ~*\.php$                      1;
    ~*\.asp$                      1;
    ~*\.aspx$                     1;
}

# --- Block unexpected HTTP methods on API ---
map $request_method $block_method {
    default                     0;
    ~^(TRACE|TRACK|CONNECT)$    1;
}
